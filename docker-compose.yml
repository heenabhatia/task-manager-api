services:
  postgres:
    image: postgres:17
    container_name: postgres-taskmanager
    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: heena
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    image: task-manager-api
    container_name: task-manager-api
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/taskmanager
      DB_USERNAME: heena
      DB_PASSWORD: password
    depends_on:
      - postgres

volumes:
  postgres-data: